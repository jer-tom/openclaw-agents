services:
  openclaw:
    image: "${OPENCLAW_IMAGE:?set OPENCLAW_IMAGE to a pinned tag or digest}"
    init: true
    ports:
      - "${PORT}:${PORT}"
      - "127.0.0.1:18789:18789"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./data/linuxbrew:/home/linuxbrew
      - ./server.mjs:/hostinger/server.mjs:ro
